name: Build and test dotnet

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  dotnet-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      code-quality: write
      pull-requests: read

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Check formatting
        run: dotnet format --verify-no-changes

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --verbosity normal --configuration Release --coverlet --coverlet-output-format cobertura

      - name: Install report generator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        run: reportgenerator -reporttypes:"MarkdownSummaryGithub;Cobertura" -reports:**/coverage.cobertura.*.xml -targetdir:./reports/coverage

      - name: Enforce coverage threshold
        shell: pwsh
        run: |
          [xml]$coverage = Get-Content './reports/coverage/Cobertura.xml'
          $lineRate = [double]$coverage.coverage.'line-rate'
          if ($lineRate -lt 0.95) {
            throw "Line coverage $lineRate is below 0.95."
          }

      - name: Upload coverage report
        if: (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]') || (github.event_name != 'pull_request' && github.ref_name == github.event.repository.default_branch)
        uses: actions/upload-code-coverage@v1
        with:
          file: ./reports/coverage/Cobertura.xml
          language: CSharp
          label: code-coverage/dotnet

      - uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: reports/coverage

      - name: Publish coverage report to GitHub Step Summary
        run: |
          cat reports/coverage/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
